{{ define "main" }}
<div class="single-layout page-layout">
    <div class="single-content-area">
        
        <header class="single-header page-header">
            <h1 class="single-title">Tags</h1>
        </header>

        <div class="taxonomy-cloud">
            {{ range .Data.Terms.ByCount }}
            <a href="{{ .Page.RelPermalink }}" class="tag taxonomy-tag">
                #{{ .Page.Title }}
                <span class="tag-count">· {{ .Count }}</span>
            </a>
            {{ end }}
        </div>

    </div>
</div>
{{ end }}
