baseURL = "https://your-custom-domain.com/"
title = "Lucid Void"
theme = "hugo-theme-lucidvoid"
themesDir = "../.."
languageCode = "en-gb" 
hasCJKLanguage = true
buildFuture = true

[outputs]
  # [EN] Ensure JSON is generated for local search / [ZH] 确保输出 JSON 以支持本地搜索
  home = ["HTML", "RSS", "JSON"] 

[taxonomies]
  # [EN] We embrace a flat taxonomy system using only Tags / [ZH] 极简主义：仅启用标签，禁用分类
  tag = "tags"

[params]
  slogan = "A Hugo Theme for Plain Text Blogging"
  description = "A minimalist Hugo theme synthesizing Metro UI paradigms with plain text focus."
  keywords = "Hugo Theme, Plain Text, Minimalist, Metro UI, Blog"
  SEOTitle = "Lucid Void - Plain Text Hugo Theme"

  # [EN] Webmaster verifications / [ZH] 站长验证与统计
  googleSearchConsole = "Your_HTML_Tag_Here"
  googleAnalyticsID = "G-XXXXXXXXXX" 

  # [EN] Theme Palette / [ZH] 主题色彩引擎
  themeColor = "#26a69a"       # [EN] Main brand color (Teal) / [ZH] 主题色 (水鸭绿)
  accentColor = "#e65100"      # [EN] Highlight accent color (Orange) / [ZH] 高亮辅助色 (深秋橘)
  accentLightColor = "#fff3e0" # [EN] Light background for accent / [ZH] 辅助色的浅背景底色

  homePostCount = 5 # [EN] Number of posts on homepage / [ZH] 首页显示文章数量
  author = "Your Name"

# ==========================================
# [EN] Main Menu / [ZH] 顶部主菜单配置
# ==========================================
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 2

[[menu.main]]
  name = "Archive"
  url = "/archive/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

# ==========================================
# [EN] Feature Toggles / [ZH] 功能开关
# ==========================================

  [params.katex]
    enableKaTeX = true  # [EN] Enable Math typesetting / [ZH] 开启数学公式支持

  [params.giscus]
    enableGiscus = true # [EN] Enable Giscus comments / [ZH] 开启 Giscus 评论

# ==========================================
# [EN] Code Blocks / [ZH] 代码块配置
# ==========================================

  [markup]
  [markup.highlight]
    noClasses = false 
    lineNos = true      # [EN] Show line numbers / [ZH] 是否显示行号
    tabWidth = 4

# ==========================================
# [EN] Footer Configuration / [ZH] 页脚区域配置
# ==========================================
  [params.footer]
  # [EN] Short bio (Supports HTML) / [ZH] 个人简介（支持 HTML 标签换行）
  bio = "A writer, thinker, <br>and explorer of the lucid void.<br>@Planet Earth"
  # [EN] Copyright information / [ZH] 版权信息
  copyright = "All rights reserved" 
  license = "CC BY-NC-SA 4.0"
  licenseLink = "https://creativecommons.org/licenses/by-nc-sa/4.0/"
  
  # [EN] Protected Email / [ZH] 防爬虫邮箱保护
  [params.footer.email_protected]
    user = "hello"
    domain = "example.com"

  # [EN] Quick Links / [ZH] 快速链接列表
  [[params.footer.quicklinks]]
    name = "Bio"
    url = "https://your-bio.com"
  [[params.footer.quicklinks]]
    name = "Projects"
    url = "https://your-projects.com"

  # [EN] Friends or Blogroll / [ZH] 友链列表
  [[params.footer.friends]]
    name = "Friend's Blog"
    url = "https://example.com"

  # [EN] Social Connect / [ZH] 社交媒体列表
  [[params.footer.social]]
    name = "X / Twitter"
    url = "https://twitter.com/yourhandle"
  [[params.footer.social]]
    name = "GitHub"
    url = "https://github.com/yourusername"

  [[params.footer.social]]
    name = "RSS"
    url = "/index.xml"