baseURL = "https://your-custom-domain.com/"
title = "Lucid Void"
theme = "lucidvoid"
themesDir = "../.."
languageCode = "en-gb" 
hasCJKLanguage = true
buildFuture = true

# 忽略 Markdown 直接写 HTML 标签时的烦人警告
ignoreLogs = ['warning-goldmark-raw-html']

[outputs]
  home = ["HTML", "RSS", "JSON"] # 确保输出了 JSON

[params]
  slogan = "A Hugo Theme for Plain Text Blogging"
  description = "Research archive, academic notes, and reflections on Photonics and Physics by a PhD researcher at Politecnico di Milano."
  keywords = "Photonics, Physics, Optics, Academic Blog, PhD Research, Politecnico di Milano"
  SEOTitle = "A Hugo Theme for Plain Text Blogging"

  googleSearchConsole = "这里填入Google Search Console提供的 HTML Tag 验证码"
  googleAnalyticsID = "G-XXXXXXXXXX" # 这里填入你最新的 GA4 测量 ID

  themeColor = "#26a69a"  # 你的主色调 (水鸭绿)
  accentColor = "#e65100" # 你的辅助色 (深秋橘)
  accentLightColor = "#fff3e0" # 你的浅辅助色 (极淡橘, 作为深秋橘的极淡背景色)

# ==========================================
# 顶部主菜单配置 (Main Menu)
# ==========================================
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

# 如果你想链向某个分类，直接把 URL 指过去即可
[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 2

[[menu.main]]
  name = "Archive"
  url = "/archive/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

# ==========================================
# 文章自定义配置
# ==========================================

# 数学公式支持
[params.katex]
  enableKaTeX = true

# Giscus 评论支持
[params.giscus]
  enableGiscus = true

# ==========================================
# Footer 自定义配置
# ==========================================
  [params.footer]
  # 个人简介（支持传入 HTML 标签，如 <br>）
  bio = "PhD Researcher of Physics<br>sNOm Laboratory<br>@Politecnico di Milano"
  
  # 固定邮箱地址
  [params.footer.email_protected]
    user = "Zhifan.Dai"
    domain = "outlook.com"

  # Quick Links 列表
  [[params.footer.quicklinks]]
    name = "Bio"
    url = "/bio"
  [[params.footer.quicklinks]]
    name = "Blog in Chinese"
    url = "https://your-chinese-blog.com"

  # Friends 列表
  [[params.footer.friends]]
    name = "Chengyu Fu"
    url = "https://storm-lifter-278.notion.site/20fd9d7d2ac78016877af1808ecdaaf4?v=20fd9d7d2ac781e69c79000c5eac71bb"

  # 其他社交媒体列表 (Connect)
  [[params.footer.social]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/zhi-fan-dai-958624248/"
  [[params.footer.social]]
    name = "GitHub"
    url = "https://github.com/AstroNomen"
  [[params.footer.social]]
    name = "RSS"
    url = "/index.xml"

[markup]
[markup.highlight]
  # 🎯 极其关键：关闭内联样式，允许我们自己的 CSS 接管代码块高亮！
  noClasses = false 
  # 下面这两个是可选的增强体验
  lineNos = false     # 是否显示行号 (极简风建议关掉)
  tabWidth = 4        # Tab 键的宽度